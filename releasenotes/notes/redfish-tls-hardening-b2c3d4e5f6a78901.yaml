---
features:
  - |
    Adds TLS hardening options for Redfish BMC connections.
    The new ``[redfish]tls_minimum_version`` option controls
    the minimum TLS protocol version (``1.1``, ``1.2``, or
    ``1.3``). The ``1.1`` option is available for compatibility
    with older BMC firmware. The new ``[redfish]tls_ciphers``
    option allows restricting cipher suites using OpenSSL
    cipher list format. Both options can be overridden per-node
    via ``driver_info/redfish_tls_minimum_version`` and
    ``driver_info/redfish_tls_ciphers``. When not set, system
    defaults are used.
security:
  - |
    Operators can now enforce minimum TLS protocol versions and
    restrict cipher suites for Redfish BMC connections, both
    globally and per-node. No default minimum is enforced to
    avoid breaking connectivity to older BMC firmware.
