---
upgrade:
  - |
    The default value of ``tls_minimum_version`` in the ``[api]``,
    ``[json_rpc]``, and ``[agent]`` configuration groups, as well as
    the ``webserver_tls_minimum_version`` option in ``[DEFAULT]``,
    has been changed from ``1.2`` to ``1.3``. TLS 1.3 is widely
    supported and is required for Post-Quantum Cryptography key
    exchange. This change was discussed on the openstack-discuss
    mailing list with no objections. Operators whose infrastructure
    does not yet support TLS 1.3 can restore the previous behavior
    by setting ``tls_minimum_version = 1.2`` in the affected
    configuration groups.
security:
  - |
    The minimum TLS protocol version now defaults to 1.3 across all
    Ironic services, improving security posture and enabling
    Post-Quantum Cryptography key exchange support.
